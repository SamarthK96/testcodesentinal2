name: CodeSentinal Contributor Manual Wiki Update Before PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  contributor-wiki-update:
    runs-on: ubuntu-latest

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const rawPrNumber = context.payload.inputs?.pr_number;
            const prNumber = Number(rawPrNumber);

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              throw new Error(`Invalid pr_number input received: "${rawPrNumber}"`);
            }

            const { owner, repo } = context.repo;

            console.log(`Fetching PR #${prNumber} from ${owner}/${repo}`);

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            console.log(`PR branch: ${pr.head.ref}`);
            console.log(`PR repo: ${pr.head.repo.full_name}`);

            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("head_repo", pr.head.repo.full_name);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run CodeSentinal Wiki Update
        uses: samarth96k/CodeSentinal@package-github-action-phase2
        with:
          mode: wiki-update
          pr_number: ${{ github.event.inputs.pr_number }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ github.token }}
          repo_root: "."
